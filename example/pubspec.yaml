name: face_nova_example
description: "Example app for flutter_face_nova — liveness detection, face enrolment and face matching."
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_face_nova:
    git:
      url: https://github.com/facenova/flutter_face_nova.git
  permission_handler: ^11.4.0
  image_picker: ^1.1.2
  hive_flutter: ^1.1.0
  uuid: ^4.5.1
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/screenshots/
